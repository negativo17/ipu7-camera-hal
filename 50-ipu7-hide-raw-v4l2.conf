# The Intel IPU7 ISYS exposes ~32 raw /dev/video* nodes (CSI receiver capture + subdevices).
# They are not usable cameras -- libcamhal drives them internally and the real camera is
# provided via libcamera. WirePlumber's V4L2 monitor otherwise tags every one as a "Camera"
# (media.role=Camera), flooding portal camera apps (GNOME Snapshot/aperture) with ~32 broken
# entries. Hide them; the libcamera monitor's node for the IPU camera is unaffected.
monitor.v4l2.rules = [
  {
    matches = [
      { device.product.name = "~ipu[78]" }
    ]
    actions = {
      update-props = {
        device.disabled = true
      }
    }
  }
]

